name: ai_native_editor
description: "VS Code-style adaptive knowledge workbench for tablets."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  uuid: ^4.5.3
  file_picker: ^8.1.7
  flutter_markdown: ^0.7.4
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  path: ^1.9.0
  path_provider: ^2.1.3
  flutter_tex: ^4.1.3
  markdown: ^7.2.2
  flutter_markdown_latex: ^0.3.4
  shared_preferences: ^2.3.3
  pdfx: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  # Local patched copy of flutter_tex 4.1.3: fixes Color.r/g/b/a → red/green/blue/opacity
  # to restore compatibility with Flutter < 3.27.
  flutter_tex:
    path: packages/flutter_tex
  # Local patched copy of flutter_math_fork 0.7.4: removes RenderObjectWithLayoutCallbackMixin
  # (mixin deleted in Flutter 3.22+; invokeLayoutCallback is now directly on RenderObject).
  flutter_math_fork:
    path: packages/flutter_math_fork

flutter:
  uses-material-design: true
